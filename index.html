<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KBU Operasional Pro</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f2f5f9;
}

.header{
    background:#0B4DA2;
    color:#fff;
    padding:25px;
    border-bottom-left-radius:20px;
    border-bottom-right-radius:20px;
}

.header h1{
    font-size:24px;
}

.header p{
    opacity:.8;
    margin-top:5px;
}

.container{
    padding:20px;
}

.card{
    background:#fff;
    border-radius:15px;
    padding:18px;
    margin-bottom:15px;
    box-shadow:0 3px 10px rgba(0,0,0,.1);
}

.card h3{
    color:#0B4DA2;
    margin-bottom:10px;
}

.stat{
    font-size:28px;
    font-weight:bold;
}

.grid{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:15px;
    margin-top:20px;
}

.menu{
    background:white;
    border-radius:15px;
    text-align:center;
    padding:20px;
    box-shadow:0 3px 10px rgba(0,0,0,.08);
    cursor:pointer;
    transition:.2s;
}

.menu:hover{
    transform:scale(1.03);
}

.icon{
    font-size:35px;
    margin-bottom:10px;
}

.footer{
    text-align:center;
    padding:20px;
    color:gray;
}
</style>

</head>

<body>

<div class="header">
    <h1>PT KALTIM BUMI UNGGUL</h1>
    <p>KBU Operasional Pro V5</p>
</div>

<div class="container">

<div class="card">
<h3>🚢 Shipment Aktif</h3>
<div class="stat">1 Shipment</div>
</div>

<div class="card">
<h3>📦 Target Tonase</h3>
<div class="stat">3.000 Ton</div>
</div>

<div class="card">
<h3>📈 Progress Loading</h3>
<div class="stat">0 %</div>
</div>

<div class="card">
<h3>💰 Budget</h3>
<div class="stat">Rp 0</div>
</div>

<div class="grid">

<div class="menu">
<div class="icon">🚢</div>
Shipment
</div>

<div class="menu">
<div class="icon">💰</div>
HPP
</div>

<div class="menu">
<div class="icon">🚛</div>
Loading
</div>

<div class="menu">
<div class="icon">⛽</div>
Operasional
</div>

<div class="menu">
<div class="icon">💵</div>
Cash Flow
</div>

<div class="menu">
<div class="icon">📄</div>
Dokumen
</div>

<div class="menu">
<div class="icon">📊</div>
Laporan
</div>

<div class="menu">
<div class="icon">⚙️</div>
Setting
</div>

</div>

</div>

<div class="footer">
KBU Operasional Pro © 2026
</div>

</body>
</html>
